name: CI

on:
  pull_request:
    branches: [ master ]

permissions:
  pull-requests: write
  checks: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: [ self-hosted, linux, dotnet10 ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=results.trx" --results-directory ./TestResults
        env:
          JwtSettings__SecretKey: "ci-test-secret-key-minimum-32-chars!!"

      - name: Test Report
        uses: EnricoMi/publish-unit-test-result-action/linux@v2
        if: always()
        with:
          files: "./TestResults/results.trx"

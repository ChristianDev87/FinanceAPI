name: CI

on:
  pull_request:
    branches: [ master ]

permissions:
  pull-requests: write
  checks: write

jobs:
  build-and-test:
    runs-on: [ self-hosted, linux, dotnet10 ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=results.xml" --results-directory ./TestResults
        env:
          JwtSettings__SecretKey: "ci-test-secret-key-minimum-32-chars!!"

      - name: Debug - Zeige TestResults
        if: always()
        run: find . -name "*.trx" 2>/dev/null || echo "Keine .trx Dateien gefunden"

      - name: Test Report
        uses: EnricoMi/publish-unit-test-result-action/linux@v2
        if: always()
        with:
          files: "./TestResults/*.trx"
